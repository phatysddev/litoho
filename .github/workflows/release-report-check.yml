name: Release Report Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-release-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run release verify
        run: pnpm run release:verify -- --report artifacts/release-report.json

      - name: Validate release report
        run: pnpm run release:report:check -- --report artifacts/release-report.json

      - name: Write job summary
        if: always()
        run: pnpm run release:report:summary -- --report artifacts/release-report.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: artifacts/release-report.json
